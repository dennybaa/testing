name: test

on:
  workflow_dispatch:
    inputs:
      caller-repo:
        description: Repo dispatching the workflow
        required: false
        type: string

  # push:
  #   branches:
  #     - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout Nu modules
        uses: actions/checkout@v4
        with:
          repository: bitdeps/nu_scripts
          path: nu_scripts

      - uses: hustcer/setup-nu@main

      - name: prepare-env
        env:
          NU_MODULE_DIRS: |-
            ${{ github.workspace }}/nu_scripts/modules;
            ${{ github.workspace }}/nu_scripts/scripts;
          GITHUB_TOKEN: ${{ secrets.MYPAT }}

        shell: nu {0}
        run: |-
          source ${{ github.workspace }}/nu_scripts/scripts/common/env.nu
          cd code; nu -I (nu-include-dirs) ./nu/dispatch.nu
