name: test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout Nu modules
        uses: actions/checkout@v4
        with:
          repository: bitdeps/nu_scripts
          path: nu_scripts

      - uses: hustcer/setup-nu@main

      - name: test
        shell: nu {0}
        working-directory: code
        with:
          github-token: ${{ secrets.MYPAT }}
        env:
          NU_LOG_LEVEL: error
          NU_MODULE_DIRS: ${{ github.workspace }}/nu_scripts/modules
        run: |-
          source ${{ github.workspace }}/nu_scripts/scripts/env/setup.nu

          print $env.NU_LIB_DIRS
          #use gh
          #gh core notice 'Something to notice'
