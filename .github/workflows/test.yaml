name: test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout Nu modules
        uses: actions/checkout@v4
        with:
          repository: bitdeps/nu_scripts
          path: nu

      - uses: hustcer/setup-nu@main

      - name: prepare-env
        shell: nu -I ${{ github.workspace }}/nu -c '{0}'
        run: |-
          use gh
          gh core notice 'Something to notice'
