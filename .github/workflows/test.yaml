name: test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout Nu modules
        uses: actions/checkout@v4
        with:
          repository: bitdeps/nu_scripts
          path: nu_scripts

      - uses: hustcer/setup-nu@main

      - name: test
        shell: nu {0}
        working-directory: code
        env:
          GITHUB_TOKEN: ${{ secrets.MYPAT }}
          NU_LOG_LEVEL: error
          NU_MODULE_DIRS: ${{ github.workspace }}/nu_scripts/modules

        run: |-
          const scripts_dir = '${{ github.workspace }}/nu_scripts/scripts'
          source-env $'($scripts_dir)/env/setup.nu'

          use gh
          gh core notice 'Something to notice'
