name: test

on:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Nu modules
        uses: actions/checkout@v4
        with:
          repository: bitdeps/nu_scripts
          path: nu_scripts
      - uses: hustcer/setup-nu@main

      - name: test
        shell: nu {0}
        run: |-
          const NU_LIB_DIRS = [ ${{ github.workspace }}/nu_scripts/modules ]

          use gh
          gh workflow list
          echo ${{ inputs.text }}
